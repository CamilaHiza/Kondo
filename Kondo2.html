<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kondo 2</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0b0c10;
  --surface: #13141a;
  --surface2: #1a1c25;
  --border: #272a36;
  --text: #e8eaf0;
  --dim: #6b7089;
  --red: #ff3b30;
  --red-bg: rgba(255,59,48,0.09);
  --red-border: rgba(255,59,48,0.28);
  --yellow: #ffd60a;
  --yellow-bg: rgba(255,214,10,0.07);
  --yellow-border: rgba(255,214,10,0.22);
  --gray-bg: rgba(58,63,82,0.25);
  --gray-border: rgba(58,63,82,0.45);
  --green: #30d158;
  --accent: #7c6af7;
  --accent2: #a78bfa;
  --blue: #0a84ff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 28px; border-bottom: 1px solid var(--border);
  background: var(--surface); position: sticky; top: 0; z-index: 100;
  gap: 10px; flex-wrap: wrap;
}
.logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.35rem; letter-spacing: -1px; }
.logo span { color: var(--accent2); }

.header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

.streak-badge {
  display: flex; align-items: center; gap: 5px;
  background: rgba(255,159,10,0.12); border: 1px solid rgba(255,159,10,0.3);
  border-radius: 20px; padding: 4px 12px;
  font-size: 0.78rem; font-weight: 600; color: #ff9f0a;
  cursor: default;
}
.today-badge {
  display: flex; align-items: center; gap: 5px;
  background: rgba(48,209,88,0.1); border: 1px solid rgba(48,209,88,0.25);
  border-radius: 20px; padding: 4px 12px;
  font-size: 0.78rem; font-weight: 600; color: var(--green);
  cursor: default;
}

.tabs { display: flex; gap: 4px; }
.tab-btn {
  padding: 6px 14px; border-radius: 8px; border: none;
  font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 500;
  cursor: pointer; transition: all 0.2s; background: transparent; color: var(--dim);
}
.tab-btn.active { background: var(--accent); color: #fff; }
.tab-btn:hover:not(.active) { background: var(--surface2); color: var(--text); }

.btn {
  padding: 7px 14px; border-radius: 8px; border: none; cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 500; transition: all 0.2s;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #6b59e8; }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--border); }
.btn-green { background: rgba(48,209,88,0.12); color: var(--green); border: 1px solid rgba(48,209,88,0.25); }
.btn-green:hover { background: rgba(48,209,88,0.2); }
.btn-orange { background: rgba(255,159,10,0.12); color: #ff9f0a; border: 1px solid rgba(255,159,10,0.25); }
.btn-orange:hover { background: rgba(255,159,10,0.22); }
.btn-red { background: rgba(255,59,48,0.1); color: var(--red); border: 1px solid rgba(255,59,48,0.25); }
.btn-red:hover { background: rgba(255,59,48,0.18); }

.main { padding: 22px 28px; max-width: 960px; margin: 0 auto; }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* BOARD TOOLBAR */
.board-toolbar {
  display: flex; align-items: center; gap: 8px; margin-bottom: 18px; flex-wrap: wrap;
}
.board-toolbar-left { display: flex; align-items: center; gap: 8px; flex: 1; flex-wrap: wrap; }
.board-toolbar-right { display: flex; align-items: center; gap: 8px; }

.filter-group { display: flex; gap: 4px; flex-wrap: wrap; }
.filter-chip {
  padding: 4px 10px; border-radius: 20px; font-size: 0.73rem; font-weight: 500;
  cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--dim);
  transition: all 0.15s;
}
.filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.filter-chip:hover:not(.active) { border-color: var(--dim); color: var(--text); }

.label-chip {
  padding: 3px 9px; border-radius: 20px; font-size: 0.68rem; font-weight: 600;
  cursor: pointer; border: 1px solid; transition: all 0.15s; display: inline-flex; align-items: center; gap: 4px;
}

/* PROJECT SECTION */
.project-section { margin-bottom: 22px; }
.project-header {
  display: flex; align-items: center; gap: 8px; padding: 8px 12px 8px 0;
  cursor: pointer; user-select: none; border-bottom: 1px solid var(--border); margin-bottom: 10px;
}
.project-name {
  font-family: 'Syne', sans-serif; font-size: 0.8rem; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase; color: var(--dim);
  flex: 1;
}
.project-count { font-size: 0.66rem; padding: 1px 7px; border-radius: 10px; background: var(--surface2); color: var(--dim); }
.project-toggle { color: var(--dim); font-size: 0.75rem; transition: transform 0.2s; }
.project-toggle.collapsed { transform: rotate(-90deg); }

.task-list { display: flex; flex-direction: column; gap: 8px; }

.section-label {
  font-family: 'Syne', sans-serif; font-size: 0.68rem; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase; color: var(--dim);
  padding: 6px 0 3px; margin-top: 6px;
  display: flex; align-items: center; gap: 8px;
}
.section-count { font-size: 0.64rem; padding: 1px 7px; border-radius: 10px; background: var(--surface2); color: var(--dim); }

/* TASK CARD */
.task-card {
  border-radius: 12px; padding: 12px 14px;
  border: 1px solid; transition: transform 0.2s, box-shadow 0.2s;
  animation: slideIn 0.22s ease;
}
@keyframes slideIn { from { opacity:0; transform:translateY(-5px); } to { opacity:1; transform:translateY(0); } }
.task-card:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,0.35); }
.task-card.urgent { background: var(--red-bg); border-color: var(--red-border); }
.task-card.important { background: var(--yellow-bg); border-color: var(--yellow-border); }
.task-card.normal { background: var(--gray-bg); border-color: var(--gray-border); }

.task-card-top { display: flex; align-items: flex-start; gap: 10px; }
.priority-bar { width: 3px; min-height: 36px; border-radius: 3px; flex-shrink: 0; margin-top: 2px; }
.urgent .priority-bar { background: var(--red); box-shadow: 0 0 8px rgba(255,59,48,0.35); }
.important .priority-bar { background: var(--yellow); }
.normal .priority-bar { background: #3a3f52; }

.task-body { flex: 1; min-width: 0; }
.task-name { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 0.9rem; margin-bottom: 3px; line-height: 1.3; }
.task-desc { font-size: 0.77rem; color: var(--dim); margin-bottom: 5px; line-height: 1.45; }
.task-meta { display: flex; align-items: center; gap: 8px; font-size: 0.72rem; color: var(--dim); flex-wrap: wrap; }
.priority-badge { font-size: 0.65rem; padding: 2px 7px; border-radius: 10px; font-weight: 500; }
.urgent .priority-badge { background: rgba(255,59,48,0.15); color: var(--red); }
.important .priority-badge { background: rgba(255,214,10,0.12); color: var(--yellow); }
.normal .priority-badge { background: rgba(58,63,82,0.4); color: var(--dim); }
.time-est { font-size: 0.68rem; background: rgba(124,106,247,0.1); color: var(--accent2); border-radius: 8px; padding: 2px 7px; }

.task-labels { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
.task-label { font-size: 0.64rem; padding: 2px 8px; border-radius: 10px; font-weight: 600; }

/* SUBTASKS */
.subtasks-section { margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.06); }
.subtask-row { display: flex; align-items: center; gap: 7px; padding: 3px 0; }
.subtask-check {
  width: 16px; height: 16px; border-radius: 4px; border: 1px solid var(--border);
  background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.15s; font-size: 0.65rem; color: var(--green);
}
.subtask-check.done { background: rgba(48,209,88,0.15); border-color: rgba(48,209,88,0.4); }
.subtask-text { font-size: 0.76rem; color: var(--dim); flex: 1; }
.subtask-text.done { text-decoration: line-through; opacity: 0.5; }
.subtask-progress { font-size: 0.65rem; color: var(--dim); margin-left: 2px; }

/* TASK ACTIONS */
.task-actions { display: flex; gap: 5px; flex-shrink: 0; flex-direction: column; align-items: flex-end; }
.action-btn {
  width: 26px; height: 26px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--dim); font-size: 0.75rem;
  cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.action-btn:hover { background: var(--border); color: var(--text); }
.complete-btn {
  width: 28px; height: 28px; border-radius: 50%; border: 2px solid;
  background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; flex-shrink: 0; font-size: 0.8rem; font-weight: 700;
}
.urgent .complete-btn { border-color: var(--red); color: var(--red); }
.urgent .complete-btn:hover { background: rgba(255,59,48,0.15); transform: scale(1.1); }
.important .complete-btn { border-color: var(--yellow); color: var(--yellow); }
.important .complete-btn:hover { background: rgba(255,214,10,0.1); transform: scale(1.1); }
.normal .complete-btn { border-color: #3a3f52; color: var(--dim); }
.normal .complete-btn:hover { background: rgba(58,63,82,0.3); transform: scale(1.1); }

/* TIMER */
.timer-bar {
  display: flex; align-items: center; gap: 8px;
  margin-top: 8px; padding-top: 8px;
  border-top: 1px solid rgba(255,255,255,0.06);
  flex-wrap: wrap;
}
.timer-display {
  font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700;
  color: var(--text); letter-spacing: 1px; min-width: 68px;
}
.timer-display.running { color: var(--green); }
.timer-btn {
  padding: 3px 10px; border-radius: 8px; font-size: 0.72rem; font-weight: 600;
  cursor: pointer; border: 1px solid; transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
}
.timer-btn-start { background: rgba(48,209,88,0.1); color: var(--green); border-color: rgba(48,209,88,0.3); }
.timer-btn-start:hover { background: rgba(48,209,88,0.2); }
.timer-btn-pause { background: rgba(255,214,10,0.1); color: var(--yellow); border-color: rgba(255,214,10,0.3); }
.timer-btn-pause:hover { background: rgba(255,214,10,0.18); }
.timer-btn-reset { background: transparent; color: var(--dim); border-color: var(--border); }
.timer-btn-reset:hover { color: var(--text); background: var(--surface2); }
.timer-label { font-size: 0.67rem; color: var(--dim); }

/* FOCUS MODE */
.focus-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.92);
  display: flex; align-items: center; justify-content: center;
  z-index: 900; padding: 20px;
}
.focus-card {
  background: var(--surface); border-radius: 20px; padding: 36px;
  max-width: 500px; width: 100%; border: 1px solid var(--border);
  text-align: center; animation: popIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
}
@keyframes popIn { from { opacity:0; transform:scale(0.88); } to { opacity:1; transform:scale(1); } }
.focus-label { font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; color: var(--accent2); margin-bottom: 8px; }
.focus-priority { font-size: 0.78rem; margin-bottom: 16px; }
.focus-title { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; line-height: 1.2; margin-bottom: 12px; }
.focus-desc { font-size: 0.85rem; color: var(--dim); line-height: 1.55; margin-bottom: 16px; }
.focus-meta { display: flex; justify-content: center; gap: 14px; font-size: 0.75rem; color: var(--dim); margin-bottom: 24px; flex-wrap: wrap; }
.focus-subtasks { text-align: left; margin-bottom: 20px; }
.focus-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

/* HISTORY */
.history-list { display: flex; flex-direction: column; gap: 8px; }
.history-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 16px;
  display: flex; gap: 10px; align-items: flex-start;
  animation: slideIn 0.22s ease;
}
.history-check { color: var(--green); font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }
.history-body { flex: 1; }
.history-name { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 0.88rem; margin-bottom: 3px; }
.history-meta { font-size: 0.73rem; color: var(--dim); display: flex; gap: 10px; flex-wrap: wrap; }
.history-badge { display: inline-flex; align-items: center; gap: 5px; margin-top: 5px; font-size: 0.76rem; background: rgba(124,106,247,0.1); border: 1px solid rgba(124,106,247,0.2); border-radius: 8px; padding: 2px 9px; color: var(--accent2); }

/* GALLERY */
.gallery-header { font-family:'Syne',sans-serif; font-size:0.68rem; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--dim); margin-bottom:14px; }
.gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
.trophy-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 16px 10px; text-align: center;
  animation: popIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
  transition: transform 0.2s;
}
.trophy-card:hover { transform: translateY(-2px); }
.trophy-emoji { font-size: 2rem; display: block; margin-bottom: 6px; }
.trophy-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.67rem; color: var(--accent2); margin-bottom: 2px; }
.trophy-task { font-size: 0.62rem; color: var(--dim); line-height: 1.3; }
.trophy-count { font-size: 0.59rem; margin-top: 2px; color: var(--dim); }

/* LABELS MANAGER */
.labels-section { margin-bottom: 20px; }
.labels-bar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }

/* EMPTY */
.empty { text-align: center; padding: 50px 20px; color: var(--dim); }
.empty-icon { font-size: 2.2rem; margin-bottom: 10px; }
.empty-title { font-family: 'Syne', sans-serif; font-size: 0.92rem; font-weight: 700; margin-bottom: 5px; }
.empty-desc { font-size: 0.78rem; }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.78);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; backdrop-filter: blur(4px); padding: 16px;
}
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 24px; width: 100%; max-width: 500px;
  max-height: 90vh; overflow-y: auto;
}
.modal-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; margin-bottom: 16px; }
.form-group { margin-bottom: 12px; }
.form-label { font-size: 0.72rem; color: var(--dim); margin-bottom: 4px; display: block; font-weight: 500; }
.form-input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 11px; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 0.84rem; outline: none; transition: border-color 0.2s;
  resize: vertical;
}
.form-input:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.form-row { display: flex; gap: 10px; }
.form-row .form-group { flex: 1; }

/* SUBTASK EDITOR */
.subtask-editor { display: flex; gap: 6px; margin-top: 6px; }
.subtask-editor input { flex: 1; }
.subtask-list-edit { display: flex; flex-direction: column; gap: 4px; margin-top: 6px; }
.subtask-edit-row { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; }
.subtask-remove { background: none; border: none; color: var(--dim); cursor: pointer; font-size: 0.9rem; padding: 2px; }
.subtask-remove:hover { color: var(--red); }

/* LABELS PICKER */
.labels-picker { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
.label-pick-btn {
  padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600;
  cursor: pointer; border: 1px solid; transition: all 0.15s; opacity: 0.5;
}
.label-pick-btn.selected { opacity: 1; }

/* CELEBRATION */
.logro-overlay {
  position: fixed; inset: 0; z-index: 2000;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.65); backdrop-filter: blur(4px);
}
.logro-card {
  background: var(--surface); border: 1px solid var(--accent);
  border-radius: 20px; padding: 30px 38px; text-align: center;
  box-shadow: 0 0 50px rgba(124,106,247,0.22);
  animation: popIn 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
  max-width: 300px; width: 90%;
}
.logro-emoji { font-size: 3.2rem; display: block; margin-bottom: 8px; }
.logro-label { font-size: 0.65rem; letter-spacing: 2px; color: var(--accent2); font-weight: 700; text-transform: uppercase; margin-bottom: 5px; }
.logro-nombre { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 800; margin-bottom: 5px; }
.logro-tarea { font-size: 0.8rem; color: var(--dim); margin-bottom: 8px; line-height: 1.4; }
.logro-streak { font-size: 0.78rem; color: #ff9f0a; margin-bottom: 16px; font-weight: 600; }

/* CONFETTI */
.confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 1999; overflow: hidden; }
.confetti-piece {
  position: absolute; width: 8px; height: 8px; border-radius: 2px;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

/* NOTIFICATION TOAST */
.toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 3000;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 18px; font-size: 0.82rem;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4); max-width: 300px;
  animation: slideInRight 0.3s ease;
}
@keyframes slideInRight { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

@media (max-width: 600px) {
  header { padding: 10px 12px; }
  .main { padding: 14px 12px; }
  .focus-card { padding: 24px 18px; }
}
</style>
</head>
<body>

<header>
  <div class="logo"><span>Kon</span>do <span style="font-size:0.65rem;color:var(--dim);font-weight:400;font-family:'DM Sans',sans-serif">2</span></div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('board')">📋 Tablero</button>
    <button class="tab-btn" onclick="switchTab('history')">✅ Historial</button>
    <button class="tab-btn" onclick="switchTab('gallery')">🏆 Logros</button>
  </div>
  <div class="header-right">
    <div class="streak-badge" title="Racha de días consecutivos">🔥 <span id="streak-display">0</span> días</div>
    <div class="today-badge" title="Tareas completadas hoy vs ayer">✓ <span id="today-display">0</span> hoy · <span id="yesterday-display">0</span> ayer</div>
    <button class="btn btn-primary" onclick="abrirModalTarea()">＋ Tarea</button>
  </div>
</header>

<div class="main">
  <!-- TABLERO -->
  <div id="tab-board" class="tab-content active">
    <div class="board-toolbar">
      <div class="board-toolbar-left">
        <div class="filter-group" id="filter-priority">
          <button class="filter-chip active" onclick="setFilter('all')">Todas</button>
          <button class="filter-chip" onclick="setFilter('urgent')">🔴 Urgente</button>
          <button class="filter-chip" onclick="setFilter('important')">🟡 Importante</button>
          <button class="filter-chip" onclick="setFilter('normal')">⚫ Normal</button>
        </div>
        <div id="label-filters" class="filter-group"></div>
      </div>
      <div class="board-toolbar-right">
        <button class="btn btn-orange" onclick="porDondeEmpiezo()">🎲 ¿Por dónde empiezo?</button>
        <button class="btn btn-green" onclick="activarFoco()">🎯 Modo foco</button>
      </div>
    </div>
    <div id="task-list" class="task-list"></div>
  </div>

  <!-- HISTORIAL -->
  <div id="tab-history" class="tab-content">
    <div id="history-list" class="history-list"></div>
  </div>

  <!-- LOGROS -->
  <div id="tab-gallery" class="tab-content">
    <div id="gallery-content"></div>
  </div>
</div>

<!-- ── MODAL TAREA ── -->
<div class="modal-overlay" id="modal-tarea" style="display:none">
  <div class="modal">
    <div class="modal-title" id="modal-tarea-titulo">Nueva Tarea</div>
    <div class="form-group">
      <label class="form-label">Nombre *</label>
      <input class="form-input" id="t-nombre" placeholder="Ej: Preparar presentación"/>
    </div>
    <div class="form-group">
      <label class="form-label">Descripción</label>
      <textarea class="form-input" id="t-desc" rows="2" placeholder="Detalles opcionales..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">

// ── STORAGE ──
function cargarDatos() {
  try { APP.tareas    = JSON.parse(localStorage.getItem('kondo2_tareas')    || '[]'); } catch(e){ APP.tareas=[]; }
  try { APP.historial = JSON.parse(localStorage.getItem('kondo2_historial') || '[]'); } catch(e){ APP.historial=[]; }

// ── HELPERS ──
function getPrioridad(fecha) {
  var diff = (new Date(fecha) - new Date()) / 3600000;
  if (diff <= 48)  return 'urgent';
  if (diff <= 168) return 'important';
  return 'normal';
}
function tiempoRestante(fecha) {
  var diff = new Date(fecha) - new Date();
  if (diff < 0) return 'Vencida';
  var h = Math.floor(diff / 3600000);
  if (h < 24) return h + 'h restantes';
  var d = Math.floor(h / 24);
  if (d < 7) return d + 'd restantes';
  return Math.floor(d/7) + ' sem restantes';
}
function fmtFecha(iso) {
  return new Date(iso).toLocaleDateString('es-AR', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
}
function fmtDia(iso) {
  return new Date(iso).toLocaleDateString('es-AR', { day:'2-digit', month:'short', year:'numeric' });
}
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function hexToRgba(hex, alpha) {
  var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+alpha+')';
}
function getEtiqueta(id) {
  for(var i=0;i<APP.etiquetas.length;i++) if(APP.etiquetas[i].id===id) return APP.etiquetas[i];
  return null;
}

// ── STREAK & TODAY COUNTS ──
function calcStreak() {
  var fechas = APP.historial.map(function(h){ return fmtDia(h.completadaEn); });
  var unique = [];
  fechas.forEach(function(f){ if(unique.indexOf(f)<0) unique.push(f); });
  unique.sort();
  if (unique.length === 0) return 0;
  var today = fmtDia(new Date().toISOString());
  var streak = 0;
  var cur = new Date(); cur.setHours(0,0,0,0);
  for (var i = 0; i < 365; i++) {
    var d = new Date(cur); d.setDate(d.getDate() - i);
    var ds = fmtDia(d.toISOString());
    if (unique.indexOf(ds) >= 0) { streak++; }
    else if (i > 0) break;
  }
  return streak;
}
function countToday() {
  var hoy = fmtDia(new Date().toISOString());
  return APP.historial.filter(function(h){ return fmtDia(h.completadaEn) === hoy; }).length;
}
function countYesterday() {
  var ayer = new Date(); ayer.setDate(ayer.getDate()-1);
  var ayerStr = fmtDia(ayer.toISOString());
  return APP.historial.filter(function(h){ return fmtDia(h.completadaEn) === ayerStr; }).length;
}
function updateStats() {
  document.getElementById('streak-display').textContent = calcStreak();
  document.getElementById('today-display').textContent = countToday();
  document.getElementById('yesterday-display').textContent = countYesterday();
}

// ── FILTERS ──
function setFilter(f) {

    c.classList.toggle('active', c.textContent.toLowerCase().indexOf(f==='all'?'todas':f)>=0 || (f==='all'&&c.textContent==='Todas'));

function setLabelFilter(lid) {
  APP.filtroEtiqueta = (APP.filtroEtiqueta===lid) ? null : lid;

function renderLabelFilters() {

    html += '<button class="filter-chip'+(sel?' active':'').toString()+'" onclick="setLabelFilter(\''+l.id+'\')" style="'+(sel?'background:'+l.color+';border-color:'+l.color+';color:#fff;':'border-color:'+l.color+';color:'+l.color+';')+'">#'+esc(l.nombre)+'</button>';
  });
  el.innerHTML = html;
}

// ── RENDER TABLERO ──
function renderTablero() {
  var lista = document.getElementById('task-list');
  var activas = APP.tareas.slice().sort(function(a,b){
    var o={'urgent':0,'important':1,'normal':2};
    var pa=getPrioridad(a.fecha), pb=getPrioridad(b.fecha);
    if(o[pa]!==o[pb]) return o[pa]-o[pb];
    return new Date(a.fecha)-new Date(b.fecha);
  });
  // Filter by priority
  if (APP.filtro !== 'all') {
    activas = activas.filter(function(t){ return getPrioridad(t.fecha)===APP.filtro; });
  }
  // Filter by label
  if (APP.filtroEtiqueta) {
    activas = activas.filter(function(t){ return t.etiquetas && t.etiquetas.indexOf(APP.filtroEtiqueta)>=0; });
  }

  renderLabelFilters();

  if (activas.length===0) {
    lista.innerHTML = '<div class="empty"><div class="empty-icon">🎯</div><div class="empty-title">Sin tareas pendientes</div><div class="empty-desc">Presioná "+ Tarea" para agregar una.</div></div>';
    return;
  }

  // Group by project then by priority
  var proyectos = {};
  activas.forEach(function(t){
    var p = t.proyecto || '__libre__';
    if(!proyectos[p]) proyectos[p]=[];
    proyectos[p].push(t);
  });

  var html = '';
  var prioOrd = ['urgent','important','normal'];
  var prioLabels = {urgent:'🔴 Urgente', important:'🟡 Importante', normal:'⚫ Puede esperar'};

  Object.keys(proyectos).sort(function(a,b){ return a==='__libre__'?1:b==='__libre__'?-1:a.localeCompare(b); }).forEach(function(pname){
    var items = proyectos[pname];
    var pid = 'proj-'+pname.replace(/[^a-z0-9]/gi,'_');
    if(pname!=='__libre__') {
      html += '<div class="project-section"><div class="project-header" onclick="toggleProj(\''+pid+'\')">';
      html += '<span style="font-size:0.75rem">📁</span>';
      html += '<span class="project-name">'+esc(pname)+'</span>';
      html += '<span class="project-count">'+items.length+'</span>';
      html += '<span class="project-toggle" id="pt-'+pid+'">▾</span>';
      html += '</div><div id="'+pid+'" class="task-list">';
    } else {
      html += '<div class="task-list">';
    }
    prioOrd.forEach(function(pkey){
      var group = items.filter(function(t){ return getPrioridad(t.fecha)===pkey; });
      if(group.length===0) return;
      html += '<div class="section-label">'+prioLabels[pkey]+' <span class="section-count">'+group.length+'</span></div>';
      group.forEach(function(t){ html += buildTaskCard(t); });
    });
    html += '</div>';
    if(pname!=='__libre__') html += '</div>';
  });
  lista.innerHTML = html;
}

function toggleProj(pid) {
  var el = document.getElementById(pid);
  var arrow = document.getElementById('pt-'+pid);
  if(!el) return;
  var hidden = el.style.display==='none';
  el.style.display = hidden ? '' : 'none';
  if(arrow) arrow.classList.toggle('collapsed', !hidden);
}

function buildTaskCard(t) {
  var p = getPrioridad(t.fecha);
  var labels = {urgent:'Urgente', important:'Importante', normal:'Normal'};
  var subtareas = t.subtareas || [];
  var doneSubs = subtareas.filter(function(s){ return s.done; }).length;

  var labelHtml = '';
  if(t.etiquetas && t.etiquetas.length>0){
    labelHtml = '<div class="task-labels">';
    t.etiquetas.forEach(function(lid){
      var l = getEtiqueta(lid);
      if(l) labelHtml += '<span class="task-label" style="background:'+hexToRgba(l.color,0.15)+';color:'+l.color+';border:1px solid '+hexToRgba(l.color,0.3)+'">#'+esc(l.nombre)+'</span>';
    });
    labelHtml += '</div>';
  }

  var subtaskHtml = '';
  if(subtareas.length>0){
    subtaskHtml = '<div class="subtasks-section">';
    subtareas.forEach(function(s,idx){
      subtaskHtml += '<div class="subtask-row">' +
        '<button class="subtask-check'+(s.done?' done':'')+'" onclick="toggleSubtask(\''+t.id+'\','+idx+')">'+(s.done?'✓':'')+'</button>' +
        '<span class="subtask-text'+(s.done?' done':'')+'">'+ esc(s.nombre) +'</span>' +
        '</div>';
    });
    if(subtareas.length>0) subtaskHtml += '<div style="font-size:0.65rem;color:var(--dim);margin-top:3px;">'+doneSubs+'/'+subtareas.length+' completados</div>';
    subtaskHtml += '</div>';
  }

  var isTimerActive = APP.timer.tareaId === t.id;
  var timerElapsed = isTimerActive ? APP.timer.elapsed : (t.timerElapsed || 0);
  var timerRunning = isTimerActive && APP.timer.running;
  var timerHtml = '<div class="timer-bar">'+
    '<span class="timer-display'+(timerRunning?' running':'')+'" id="timer-disp-'+t.id+'">'+fmtTimer(timerElapsed)+'</span>'+
    (!timerRunning
      ? '<button class="timer-btn timer-btn-start" onclick="timerStart(\''+t.id+'\')">▶ '+(timerElapsed>0?'Continuar':'Iniciar')+'</button>'
      : '<button class="timer-btn timer-btn-pause" onclick="timerPause(\''+t.id+'\')">⏸ Pausar</button>')+
    (timerElapsed>0 ? '<button class="timer-btn timer-btn-reset" onclick="timerReset(\''+t.id+'\')">↺</button>' : '')+
    (timerElapsed>0 ? '<span class="timer-label">tiempo registrado</span>' : '<span class="timer-label">cronómetro</span>')+
  '</div>';

  return '<div class="task-card '+p+'" id="tc-'+t.id+'">'+
    '<div class="task-card-top">'+
      '<div class="priority-bar"></div>'+
      '<div class="task-body">'+
        '<div class="task-name">'+esc(t.nombre)+'</div>'+
        (t.descripcion ? '<div class="task-desc">'+esc(t.descripcion)+'</div>' : '')+
        '<div class="task-meta">'+
          '<span class="priority-badge">'+labels[p]+'</span>'+
          '<span>📅 '+fmtFecha(t.fecha)+'</span>'+
          '<span>'+tiempoRestante(t.fecha)+'</span>'+
          (t.tiempoEst ? '<span class="time-est">⏱ est. '+esc(t.tiempoEst)+'</span>' : '')+
        '</div>'+
        labelHtml+
      '</div>'+
      '<div class="task-actions">'+
        '<div style="display:flex;gap:5px;margin-bottom:4px;">'+
          '<button class="action-btn" title="Editar" onclick="abrirEditarTarea(\''+t.id+'\')">✏️</button>'+
          '<button class="action-btn" title="Eliminar" onclick="eliminarTarea(\''+t.id+'\')">🗑️</button>'+
          '<button class="complete-btn" onclick="abrirModalCompletar(\''+t.id+'\')">✓</button>'+
        '</div>'+
      '</div>'+
    '</div>'+
    subtaskHtml+
    timerHtml+
  '</div>';
}

function toggleSubtask(tareaId, idx) {
  var t = APP.tareas.find(function(x){ return x.id===tareaId; });
  if(!t||!t.subtareas) return;
  t.subtareas[idx].done = !t.subtareas[idx].done;
  guardarDatos();
  renderTablero();
}

// ── TIMER ──
function fmtTimer(ms) {
  var s = Math.floor(ms / 1000);
  var h = Math.floor(s / 3600);
  var m = Math.floor((s % 3600) / 60);
  var ss = s % 60;
  if (h > 0) return pad(h)+':'+pad(m)+':'+pad(ss);
  return pad(m)+':'+pad(ss);
}
function pad(n) { return n < 10 ? '0'+n : ''+n; }
function fmtTimerHuman(ms) {
  var s = Math.floor(ms / 1000);
  if (s < 60) return s + 's';
  var m = Math.floor(s / 60);
  if (m < 60) return m + 'min';
  var h = Math.floor(m / 60); m = m % 60;
  return h + 'h ' + (m > 0 ? m + 'min' : '');
}

function timerStart(tareaId) {
  var tm = APP.timer;
  // Pause any running timer on a different task
  if (tm.tareaId && tm.tareaId !== tareaId && tm.running) {
    timerPause(tm.tareaId);
  }
  // Save accumulated time to the task if switching
  if (tm.tareaId && tm.tareaId !== tareaId) {
    var prev = APP.tareas.find(function(x){ return x.id===tm.tareaId; });
    if (prev) { prev.timerElapsed = tm.elapsed; guardarDatos(); }
  }
  // Load elapsed from task if starting fresh on this task
  if (tm.tareaId !== tareaId) {
    var t = APP.tareas.find(function(x){ return x.id===tareaId; });
    tm.elapsed = t ? (t.timerElapsed || 0) : 0;
  }
  tm.tareaId = tareaId;
  tm.running = true;
  tm.startedAt = Date.now();
  if (tm.interval) clearInterval(tm.interval);
  tm.interval = setInterval(function() {
    tm.elapsed = tm.elapsed + (Date.now() - tm.startedAt);
    tm.startedAt = Date.now();
    var disp = document.getElementById('timer-disp-'+tareaId);
    if (disp) { disp.textContent = fmtTimer(tm.elapsed); disp.classList.add('running'); }
  }, 1000);
  // Re-render just this card's timer bar without full re-render
  renderTablero();
}

function timerPause(tareaId) {
  var tm = APP.timer;
  if (tm.tareaId !== tareaId || !tm.running) return;
  if (tm.interval) { clearInterval(tm.interval); tm.interval = null; }
  tm.elapsed = tm.elapsed + (Date.now() - (tm.startedAt || Date.now()));
  tm.running = false;
  tm.startedAt = null;
  // Persist elapsed to task
  var t = APP.tareas.find(function(x){ return x.id===tareaId; });
  if (t) { t.timerElapsed = tm.elapsed; guardarDatos(); }
  renderTablero();
}

function timerReset(tareaId) {
  var tm = APP.timer;
  if (tm.tareaId === tareaId) {
    if (tm.interval) { clearInterval(tm.interval); tm.interval = null; }
    tm.tareaId = null; tm.running = false; tm.elapsed = 0; tm.startedAt = null;
  }
  var t = APP.tareas.find(function(x){ return x.id===tareaId; });
  if (t) { t.timerElapsed = 0; guardarDatos(); }
  renderTablero();
}

function timerGetElapsed(tareaId) {
  var tm = APP.timer;
  if (tm.tareaId === tareaId) return tm.elapsed;
  var t = APP.tareas.find(function(x){ return x.id===tareaId; });
  return t ? (t.timerElapsed || 0) : 0;
}

// ── HISTORIAL ──
function renderHistorial() {
  var lista = document.getElementById('history-list');
  if(APP.historial.length===0){
    lista.innerHTML='<div class="empty"><div class="empty-icon">📂</div><div class="empty-title">Historial vacío</div><div class="empty-desc">Las tareas completadas aparecerán aquí.</div></div>';
    return;
  }
  var ord = APP.historial.slice().reverse();
  var html='';
  ord.forEach(function(h){
    var trofeo=null;
    for(var i=0;i<APP.trofeos.length;i++) if(APP.trofeos[i].historialId===h.id){ trofeo=APP.trofeos[i]; break; }
    var labelHtml='';
    if(h.etiquetas&&h.etiquetas.length>0){
      h.etiquetas.forEach(function(lid){
        var l=getEtiqueta(lid);
        if(l) labelHtml+='<span class="task-label" style="background:'+hexToRgba(l.color,0.12)+';color:'+l.color+';border:1px solid '+hexToRgba(l.color,0.25)+'">#'+esc(l.nombre)+'</span>';
      });
    }
    html+='<div class="history-card">'+
      '<div class="history-check">✅</div>'+
      '<div class="history-body">'+
        '<div class="history-name">'+esc(h.nombre)+'</div>'+
        (h.descripcion?'<div style="font-size:0.74rem;color:var(--dim);margin-bottom:4px;">'+esc(h.descripcion)+'</div>':'')+
        '<div class="history-meta">'+
          '<span>📅 Límite: '+fmtFecha(h.fecha)+'</span>'+
          '<span>✔ Completada: '+fmtFecha(h.completadaEn)+'</span>'+
          (h.tiempoEst?'<span>⏱ est. '+esc(h.tiempoEst)+'</span>':'')+
          (h.timerReal?'<span style="color:var(--green)">⏱ real: '+fmtTimerHuman(h.timerReal)+'</span>':'')+
        '</div>'+
        (labelHtml?'<div class="task-labels" style="margin-top:5px;">'+labelHtml+'</div>':'')+
        (trofeo?'<div class="history-badge">'+trofeo.emoji+' '+esc(trofeo.nombre)+'</div>':'')+
      '</div>'+
    '</div>';
  });
  lista.innerHTML=html;
}

// ── GALERÍA ──
function renderGaleria() {
  var gc=document.getElementById('gallery-content');
  if(APP.trofeos.length===0){
    gc.innerHTML='<div class="empty"><div class="empty-icon">🏆</div><div class="empty-title">Galería vacía</div><div class="empty-desc">Completá tareas para desbloquear logros.</div></div>';
    return;
  }
  var conteos={},vistos={},unicos=[];
  APP.trofeos.forEach(function(tr){ conteos[tr.nombre]=(conteos[tr.nombre]||0)+1; });
  APP.trofeos.forEach(function(tr){
    if(!vistos[tr.nombre]){ vistos[tr.nombre]=true; unicos.push({emoji:tr.emoji,nombre:tr.nombre,desc:tr.desc,count:conteos[tr.nombre]}); }
  });
  var html='<div class="gallery-header">🏆 GALERÍA DE LOGROS · '+APP.trofeos.length+' obtenidos · racha actual: '+calcStreak()+' días 🔥</div><div class="gallery-grid">';
  unicos.forEach(function(tr){
    html+='<div class="trophy-card"><span class="trophy-emoji">'+tr.emoji+'</span><div class="trophy-name">'+esc(tr.nombre)+'</div><div class="trophy-task">'+esc(tr.desc)+'</div>'+(tr.count>1?'<div class="trophy-count">x'+tr.count+'</div>':'')+'</div>';
  });
  html+='</div>';
  gc.innerHTML=html;
}

// ── MODAL TAREA ──
function abrirModalTarea() {
  APP.editandoId=null; APP.subtareasTemp=[]; APP.etiquetasSelTemp=[];
  document.getElementById('modal-tarea-titulo').textContent='Nueva Tarea';
  document.getElementById('t-nombre').value='';
  document.getElementById('t-desc').value='';
  document.getElementById('t-fecha').value='';
  document.getElementById('t-tiempo').value='';
  document.getElementById('t-proyecto').value='';
  renderProyectosDatalist();
  renderLabelsPicker();
  renderSubtareasEdit();
  document.getElementById('modal-tarea').style.display='flex';
  setTimeout(function(){ document.getElementById('t-nombre').focus(); }, 80);
}
function abrirEditarTarea(id) {
  var t=APP.tareas.find(function(x){ return x.id===id; });
  if(!t) return;
  APP.editandoId=id;
  APP.subtareasTemp=(t.subtareas||[]).map(function(s){ return {nombre:s.nombre,done:s.done}; });
  APP.etiquetasSelTemp=(t.etiquetas||[]).slice();
  document.getElementById('modal-tarea-titulo').textContent='Editar Tarea';
  document.getElementById('t-nombre').value=t.nombre;
  document.getElementById('t-desc').value=t.descripcion||'';
  document.getElementById('t-fecha').value=t.fecha?t.fecha.slice(0,16):'';
  document.getElementById('t-tiempo').value=t.tiempoEst||'';
  document.getElementById('t-proyecto').value=t.proyecto||'';
  renderProyectosDatalist();
  renderLabelsPicker();
  renderSubtareasEdit();
  document.getElementById('modal-tarea').style.display='flex';
}
function renderProyectosDatalist() {
  var dl=document.getElementById('proyectos-list');
  var ps={};
  APP.tareas.forEach(function(t){ if(t.proyecto) ps[t.proyecto]=1; });
  APP.historial.forEach(function(h){ if(h.proyecto) ps[h.proyecto]=1; });
  dl.innerHTML=Object.keys(ps).map(function(p){ return '<option value="'+esc(p)+'">'; }).join('');
}
function renderLabelsPicker() {
  var el=document.getElementById('labels-picker');
  var html='';
  APP.etiquetas.forEach(function(l){
    var sel=APP.etiquetasSelTemp.indexOf(l.id)>=0;
    html+='<button class="label-pick-btn'+(sel?' selected':'')+'" onclick="toggleLabelSel(\''+l.id+'\')" style="border-color:'+l.color+';color:'+l.color+';'+(sel?'background:'+hexToRgba(l.color,0.18)+';':'')+'">#'+esc(l.nombre)+'</button>';
  });
  el.innerHTML=html;
}
function toggleLabelSel(lid) {
  var idx=APP.etiquetasSelTemp.indexOf(lid);
  if(idx>=0) APP.etiquetasSelTemp.splice(idx,1); else APP.etiquetasSelTemp.push(lid);
  renderLabelsPicker();
}
function crearEtiqueta() {
  var nombre=document.getElementById('nueva-etiqueta').value.trim().toLowerCase().replace(/\s+/g,'-');
  var color=document.getElementById('etiqueta-color').value;
  if(!nombre) return;
  if(APP.etiquetas.find(function(l){ return l.nombre===nombre; })) return;
  var l={ id:'l'+Date.now(), nombre:nombre, color:color };
  APP.etiquetas.push(l);
  APP.etiquetasSelTemp.push(l.id);
  guardarDatos();
  document.getElementById('nueva-etiqueta').value='';
  renderLabelsPicker();
  renderLabelFilters();
}
function renderSubtareasEdit() {
  var el=document.getElementById('subtasks-edit-list');
  var html='';
  APP.subtareasTemp.forEach(function(s,i){
    html+='<div class="subtask-edit-row"><span style="flex:1">'+esc(s.nombre)+'</span><button class="subtask-remove" onclick="removeSubtareaTemp('+i+')">✕</button></div>';
  });
  el.innerHTML=html;
}
function agregarSubtarea() {
  var v=document.getElementById('nueva-subtarea').value.trim();
  if(!v) return;
  APP.subtareasTemp.push({nombre:v,done:false});
  document.getElementById('nueva-subtarea').value='';
  renderSubtareasEdit();
}
function removeSubtareaTemp(i) {
  APP.subtareasTemp.splice(i,1);
  renderSubtareasEdit();
}

function guardarTarea() {
  var nombre=document.getElementById('t-nombre').value.trim();
  var fecha=document.getElementById('t-fecha').value;
  var desc=document.getElementById('t-desc').value.trim();
  var tiempo=document.getElementById('t-tiempo').value.trim();
  var proyecto=document.getElementById('t-proyecto').value.trim();
  if(!nombre||!fecha){ alert('Completá el nombre y la fecha límite.'); return; }
  var datos={
    nombre:nombre, fecha:fecha, descripcion:desc||'', tiempoEst:tiempo||'',
    proyecto:proyecto||'', subtareas:APP.subtareasTemp.slice(),
    etiquetas:APP.etiquetasSelTemp.slice()
  };
  if(APP.editandoId) {
    var idx=APP.tareas.findIndex(function(t){ return t.id===APP.editandoId; });
    if(idx>=0) { datos.id=APP.editandoId; APP.tareas[idx]=datos; }
  } else {
    datos.id=Date.now().toString();
    APP.tareas.push(datos);
  }
  guardarDatos();
  cerrarModal('modal-tarea');
  renderTablero();
  renderLabelFilters();
}

function eliminarTarea(id) {
  if(!confirm('¿Eliminar esta tarea?')) return;
  APP.tareas=APP.tareas.filter(function(t){ return t.id!==id; });
  guardarDatos(); renderTablero();
}

// ── COMPLETAR ──
function abrirModalCompletar(id) {
  var t=APP.tareas.find(function(x){ return x.id===id; });
  if(!t) return;
  APP.completandoId=id;
  document.getElementById('cm-nombre').textContent=t.nombre;
  var ahora=new Date();
  document.getElementById('cm-fecha').value=new Date(ahora-ahora.getTimezoneOffset()*60000).toISOString().slice(0,16);
  document.getElementById('modal-completar').style.display='flex';
}
function confirmarCompletar() {
  var fechaComp=document.getElementById('cm-fecha').value;
  if(!fechaComp){ alert('Ingresá la fecha de completado.'); return; }
  var t=APP.tareas.find(function(x){ return x.id===APP.completandoId; });
  if(!t){ cerrarModal('modal-completar'); return; }
  // Stop timer if running on this task
  var timerMs = timerGetElapsed(APP.completandoId);
  if (APP.timer.tareaId === APP.completandoId && APP.timer.running) {
    if (APP.timer.interval) { clearInterval(APP.timer.interval); APP.timer.interval = null; }
    APP.timer.running = false; APP.timer.tareaId = null;
  }
  var histId=Date.now().toString();
  APP.historial.push({
    id:histId, nombre:t.nombre, fecha:t.fecha, completadaEn:fechaComp,
    descripcion:t.descripcion||'', tiempoEst:t.tiempoEst||'',
    proyecto:t.proyecto||'', etiquetas:(t.etiquetas||[]).slice(),
    timerReal: timerMs || 0
  });
  APP.tareas=APP.tareas.filter(function(x){ return x.id!==APP.completandoId; });
  var logro=LOGROS[Math.floor(Math.random()*LOGROS.length)];
  APP.trofeos.push({emoji:logro.emoji,nombre:logro.nombre,desc:logro.desc,historialId:histId,obtenidoEn:fechaComp});
  guardarDatos();
  cerrarModal('modal-completar');
  if(APP.focusTareaId===APP.completandoId) cerrarFoco();
  renderTablero();
  updateStats();
  mostrarLogro(logro, t.nombre);
  lanzarConfetti();
  scheduleReminders();
}

// ── MODO FOCO ──
function activarFoco() {
  var urgentes=APP.tareas.filter(function(t){ return getPrioridad(t.fecha)==='urgent'; });
  var importantes=APP.tareas.filter(function(t){ return getPrioridad(t.fecha)==='important'; });
  var normales=APP.tareas.filter(function(t){ return getPrioridad(t.fecha)==='normal'; });
  var pool=urgentes.length>0?urgentes:(importantes.length>0?importantes:normales);
  if(pool.length===0){ mostrarToast('No hay tareas pendientes 🎉'); return; }
  pool.sort(function(a,b){ return new Date(a.fecha)-new Date(b.fecha); });
  var t=pool[0];
  APP.focusTareaId=t.id;
  renderFocusCard(t);
  document.getElementById('focus-overlay').style.display='flex';
}
function porDondeEmpiezo() {
  var urgentes=APP.tareas.filter(function(t){ return getPrioridad(t.fecha)==='urgent'; });
  var pool=urgentes.length>0?urgentes:APP.tareas;
  if(pool.length===0){ mostrarToast('No hay tareas pendientes 🎉'); return; }
  var t=pool[Math.floor(Math.random()*pool.length)];
  APP.focusTareaId=t.id;
  renderFocusCard(t);
  document.getElementById('focus-overlay').style.display='flex';
}
function renderFocusCard(t) {
  var p=getPrioridad(t.fecha);
  var prioLabel={urgent:'🔴 Urgente',important:'🟡 Importante',normal:'⚫ Normal'};
  document.getElementById('focus-priority').innerHTML='<span style="font-size:0.85rem">'+prioLabel[p]+'</span>';
  document.getElementById('focus-title').textContent=t.nombre;
  document.getElementById('focus-desc').textContent=t.descripcion||'';
  document.getElementById('focus-meta').innerHTML=
    '<span>📅 '+fmtFecha(t.fecha)+'</span>'+
    '<span>'+tiempoRestante(t.fecha)+'</span>'+
    (t.tiempoEst?'<span>⏱ '+esc(t.tiempoEst)+'</span>':'')+
    (t.proyecto?'<span>📁 '+esc(t.proyecto)+'</span>':'');
  var sub=t.subtareas||[];
  if(sub.length>0){
    var html='<div style="font-size:0.7rem;color:var(--dim);margin-bottom:6px;font-weight:600;letter-spacing:1px;text-transform:uppercase;">Subtareas</div>';
    sub.forEach(function(s,idx){
      html+='<div class="subtask-row">'+
        '<button class="subtask-check'+(s.done?' done':'')+'" onclick="toggleSubtaskFocus(\''+t.id+'\','+idx+')">'+(s.done?'✓':'')+'</button>'+
        '<span class="subtask-text'+(s.done?' done':'')+'" style="font-size:0.82rem;color:var(--text)">'+esc(s.nombre)+'</span>'+
        '</div>';
    });
    document.getElementById('focus-subtasks').innerHTML=html;
  } else {
    document.getElementById('focus-subtasks').innerHTML='';
  }
}
function toggleSubtaskFocus(tareaId, idx) {
  var t=APP.tareas.find(function(x){ return x.id===tareaId; });
  if(!t||!t.subtareas) return;
  t.subtareas[idx].done=!t.subtareas[idx].done;
  guardarDatos();
  renderFocusCard(t);
}
function completarDesdeF() {
  cerrarFoco();
  if(APP.focusTareaId) abrirModalCompletar(APP.focusTareaId);
}
function cerrarFoco() {
  document.getElementById('focus-overlay').style.display='none';
}

// ── LOGRO + CONFETTI ──
function mostrarLogro(logro, nombreTarea) {
  document.getElementById('logro-emoji').textContent=logro.emoji;
  document.getElementById('logro-nombre').textContent=logro.nombre;
  document.getElementById('logro-tarea').textContent='Completaste: "'+nombreTarea+'"';
  var s=calcStreak();
  document.getElementById('logro-streak').textContent=s>1?'🔥 Racha: '+s+' días consecutivos':'';
  document.getElementById('logro-overlay').style.display='flex';
}
function cerrarLogro() {
  document.getElementById('logro-overlay').style.display='none';
  document.getElementById('confetti-container').innerHTML='';
}
function lanzarConfetti() {
  var container=document.getElementById('confetti-container');
  container.innerHTML='';
  var colors=['#7c6af7','#ff9f0a','#30d158','#ff3b30','#0a84ff','#ffd60a','#ff375f','#a78bfa'];
  for(var i=0;i<55;i++){
    var piece=document.createElement('div');
    piece.className='confetti-piece';
    piece.style.left=Math.random()*100+'%';
    piece.style.background=colors[Math.floor(Math.random()*colors.length)];
    piece.style.animationDuration=(1.5+Math.random()*2)+'s';
    piece.style.animationDelay=Math.random()*0.6+'s';
    piece.style.width=(6+Math.random()*8)+'px';
    piece.style.height=(6+Math.random()*8)+'px';
    piece.style.borderRadius=Math.random()>0.5?'50%':'3px';
    container.appendChild(piece);
  }
}

// ── TOAST ──
function mostrarToast(msg, duration) {
  var old=document.querySelector('.toast');
  if(old) old.remove();
  var el=document.createElement('div');
  el.className='toast'; el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(function(){ if(el.parentNode) el.remove(); }, duration||3200);
}

// ── NOTIFICACIONES ──
function pedirPermiso() {
  if(!('Notification' in window)) return;
  Notification.requestPermission().then(function(p){
    APP.notifPermiso=(p==='granted');
    mostrarToast(p==='granted'?'🔔 Notificaciones activadas':'Notificaciones denegadas');
  });
}
function scheduleReminders() {
  if(!('Notification' in window)||Notification.permission!=='granted') return;
  APP.tareas.forEach(function(t){
    var ms=new Date(t.fecha)-new Date()-3600000;
    if(ms>0&&ms<86400000) {
      setTimeout(function(){
        try { new Notification('Kondo: tarea próxima a vencer', { body:'⏰ "'+t.nombre+'" vence en menos de 1 hora.', icon:'' }); } catch(e){}
      }, ms);
    }
  });
}

// ── CERRAR MODAL ──
function cerrarModal(id) {
  document.getElementById(id).style.display='none';
}

// Cerrar modales con Escape
document.addEventListener('keydown', function(e){
  if(e.key==='Escape'){
    ['modal-tarea','modal-completar'].forEach(function(id){
      document.getElementById(id).style.display='none';
    });
    cerrarFoco();
    cerrarLogro();
  }
});

// Notif button in header area
(function(){
  if('Notification' in window && Notification.permission!=='granted'){
    var btn=document.createElement('button');
    btn.className='btn btn-secondary';
    btn.style.fontSize='0.75rem';
    btn.title='Activar notificaciones';
    btn.textContent='🔔';
    btn.onclick=pedirPermiso;
    document.querySelector('.header-right').insertBefore(btn, document.querySelector('.header-right .btn-primary'));
  } else {
    APP.notifPermiso=true;
  }
})();

// ── INIT ──
cargarDatos();
renderTablero();
renderLabelFilters();
updateStats();
scheduleReminders();
</script>
